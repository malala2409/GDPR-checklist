<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDPR Compliance Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --paper:   #faf9f5;
  --ink:     #1a1917;
  --red:     #cd3b3b;
  --red-dim: #eed8d8;
  --green:   #3b7a3b;
  --amber:   #c7852a;
  --rule:    #e4e1da;
  --rule-light: #efede8;
  --muted:   #8b8982;
  --muted-dark: #5c5a55;
  --surface: #f3f1eb;
  --white:   #fff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Top bar ────────────────────────────── */
.top-bar {
  display: flex; justify-content: flex-end;
  padding: 24px 40px 0; max-width: 960px; margin: 0 auto;
}
.lang-toggle {
  display: flex; gap: 0;
  font-family: 'DM Mono', monospace; font-size: 12px;
  font-weight: 500; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--muted);
}
.lang-toggle button {
  background: none; border: none; font: inherit; color: inherit;
  cursor: pointer; padding: 4px 0; transition: color 0.2s;
}
.lang-toggle button.active { color: var(--ink); }
.lang-toggle .sep { padding: 4px 8px; color: var(--rule); cursor: default; }

/* ── Masthead ──────────────────────────── */
.masthead {
  max-width: 960px; margin: 48px auto 0; padding: 0 40px;
  display: grid; grid-template-columns: 1fr auto;
  grid-template-rows: auto auto auto; align-items: end; gap: 0 48px;
}
.masthead-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(40px, 6vw, 72px); line-height: 0.95;
  letter-spacing: -0.015em; color: var(--ink); grid-row: 1/4; grid-column: 1;
}
.masthead-title span { display: block; font-style: italic; color: var(--red); }
.masthead-desc {
  font-size: 15px; line-height: 1.6; color: var(--muted-dark);
  max-width: 280px; grid-row: 1/3; grid-column: 2; align-self: end; padding-bottom: 8px;
}
.masthead-progress {
  grid-row: 3; grid-column: 2; display: flex; align-items: baseline;
  gap: 12px; padding-top: 16px;
}
.masthead-progress .pct {
  font-family: 'DM Mono', monospace; font-size: 40px; font-weight: 400;
  color: var(--ink); letter-spacing: -0.02em;
}
.masthead-progress .label {
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--muted); font-weight: 500;
}

/* ── Progress rule ─────────────────────── */
.progress-rule-wrap { max-width: 960px; margin: 40px auto 0; padding: 0 40px; }
.progress-rule { height: 3px; background: var(--rule); position: relative; }
.progress-rule-fill {
  height: 100%; background: var(--ink);
  transition: width 0.45s cubic-bezier(0.22,0.61,0.36,1); width: 0%;
}

/* ── Scanner ───────────────────────────── */
.scanner-wrap { max-width: 960px; margin: 48px auto 0; padding: 0 40px; }
.scanner {
  background: var(--surface); padding: 28px 32px;
  border: 1px solid var(--rule);
}
.scanner-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.scanner-head h3 {
  font-family: 'DM Serif Display', serif; font-size: 20px;
  font-weight: 400; letter-spacing: -0.01em;
}
.scanner-head .scanner-note {
  font-size: 12px; color: var(--muted); font-style: italic;
}
.scanner textarea {
  width: 100%; min-height: 140px; padding: 14px 16px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5;
  border: 1px solid var(--rule); background: var(--paper); color: var(--ink);
  resize: vertical;
}
.scanner textarea:focus { outline: none; border-color: var(--muted); }
.scanner-actions {
  display: flex; gap: 12px; margin-top: 12px; align-items: center; flex-wrap: wrap;
}
.scanner-actions .file-label {
  font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--muted-dark); cursor: pointer;
  padding: 8px 16px; border: 1px solid var(--rule); background: var(--paper);
  transition: all 0.2s;
}
.scanner-actions .file-label:hover { border-color: var(--muted-dark); color: var(--ink); }
.scanner-actions input[type="file"] { display: none; }
.scanner-actions .scan-btn {
  font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.05em; background: var(--ink); color: var(--paper);
  border: none; padding: 9px 20px; cursor: pointer; transition: background 0.2s;
}
.scanner-actions .scan-btn:hover { background: var(--muted-dark); }
.scan-results { margin-top: 20px; display: none; }
.scan-results.visible { display: block; }

.scan-summary {
  display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 20px;
}
.scan-score {
  font-family: 'DM Mono', monospace; font-size: 48px;
  font-weight: 400; letter-spacing: -0.02em; line-height: 1;
}
.scan-score.high { color: var(--green); }
.scan-score.mid  { color: var(--amber); }
.scan-score.low  { color: var(--red); }
.scan-meta { font-size: 13px; color: var(--muted-dark); line-height: 1.6; }

/* ── Scan section rows ──────────────────── */
.scan-section-row {
  display: flex; align-items: center; gap: 14px; padding: 10px 8px;
  border-bottom: 1px solid var(--rule-light); font-size: 14px;
  transition: background 0.15s; border-radius: 2px;
}
.scan-section-row:last-child { border-bottom: none; }
.scan-section-row:hover { background: rgba(0,0,0,0.02); }
.scan-section-row.clickable { cursor: pointer; }
.scan-section-row.clickable:hover { background: rgba(0,0,0,0.04); }
.scan-cat-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.scan-cat-dot.found  { background: var(--green); }
.scan-cat-dot.partial { background: var(--amber); }
.scan-cat-dot.missing { background: var(--red-dim); }
.scan-sec-numeral {
  font-family: 'DM Serif Display', serif; font-size: 14px; font-style: italic;
  color: var(--muted-dark); width: 24px; flex-shrink: 0;
}
.scan-sec-title { flex: 1; font-weight: 500; }
.scan-cat-status { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.scan-cat-match { font-size: 12px; color: var(--green); font-family: 'DM Mono', monospace; white-space: nowrap; }
.arrow { color: var(--muted); font-size: 14px; flex-shrink: 0; }

/* ── Export button ──────────────────────── */
.export-wrap { margin-top: 20px; text-align: right; }
.export-btn {
  font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.05em; background: var(--green); color: #fff;
  border: none; padding: 10px 22px; cursor: pointer; transition: background 0.2s;
}
.export-btn:hover { background: #2d602d; }
.export-btn.pdf { background: var(--red); }
.export-btn.pdf:hover { background: #a52e2e; }

/* ── Sections ──────────────────────────── */
.sections { max-width: 960px; margin: 0 auto; padding: 0 40px; }
.section { border-bottom: 1px solid var(--rule); }
.section-header {
  display: grid; grid-template-columns: 28px 1fr auto auto;
  align-items: center; gap: 16px; padding: 24px 0;
  cursor: pointer; user-select: none; transition: opacity 0.15s;
}
.section-header:hover { opacity: 0.7; }
.sec-num {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px solid var(--rule); display: flex; align-items: center;
  justify-content: center; font-family: 'DM Serif Display', serif;
  font-size: 14px; font-style: italic; color: var(--muted-dark);
  flex-shrink: 0; transition: all 0.25s;
}
.section.open .sec-num { background: var(--ink); border-color: var(--ink); color: var(--paper); }
.sec-title {
  font-family: 'DM Serif Display', serif; font-size: 20px;
  color: var(--ink); letter-spacing: -0.01em;
}
.sec-badge {
  font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); white-space: nowrap;
}
.sec-toggle {
  width: 24px; height: 24px; display: flex; align-items: center;
  justify-content: center; color: var(--muted); font-size: 18px;
  line-height: 1; transition: transform 0.3s; flex-shrink: 0;
}
.section.open .sec-toggle { transform: rotate(45deg); }
.section-body { display: none; padding: 0 0 28px 44px; }
.section.open .section-body { display: block; }

/* ── Items ─────────────────────────────── */
.item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px 8px; margin: 0 -8px;
  border-bottom: 1px solid var(--rule-light); cursor: pointer;
  transition: background 0.15s; border-radius: 2px;
}
.item:last-child { border-bottom: none; }
.item:hover { background: rgba(0,0,0,0.015); }
.item input[type="checkbox"] { display: none; }
.item label {
  width: 22px; height: 22px; border: 1.5px solid var(--rule);
  flex-shrink: 0; cursor: pointer; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.item input:checked + label { background: var(--ink); border-color: var(--ink); }
.item label::after {
  content: ''; display: block; width: 9px; height: 5px;
  border-left: 1.5px solid var(--paper); border-bottom: 1.5px solid var(--paper);
  transform: rotate(-45deg) translateY(-1px); opacity: 0; transition: opacity 0.15s;
}
.item input:checked + label::after { opacity: 1; }
.item-text { flex: 1; min-width: 0; }
.item-title {
  font-size: 15px; font-weight: 500; color: var(--ink);
  margin-bottom: 3px; transition: color 0.2s;
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
}
.item input:checked ~ .item-text .item-title {
  color: var(--muted-dark);
  text-decoration: line-through; text-decoration-color: var(--rule); text-decoration-thickness: 1px;
}
.item-desc { font-size: 14px; line-height: 1.5; color: var(--muted); }

/* Article reference tag */
.art-ref {
  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
  letter-spacing: 0.03em; text-transform: uppercase;
  color: var(--red); background: var(--red-dim);
  padding: 2px 7px; cursor: pointer; transition: all 0.15s;
  white-space: nowrap; text-decoration: none; display: inline-block;
  flex-shrink: 0;
}
.art-ref:hover { background: var(--red); color: #fff; }

/* ── Article Modal ─────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(26,25,23,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--paper); max-width: 640px; width: 100%;
  max-height: 80vh; overflow-y: auto; padding: 36px 32px;
  position: relative;
}
.modal-close {
  position: absolute; top: 16px; right: 20px;
  background: none; border: none; font-size: 22px; cursor: pointer;
  color: var(--muted); line-height: 1; transition: color 0.15s;
}
.modal-close:hover { color: var(--ink); }
.modal h4 {
  font-family: 'DM Serif Display', serif; font-size: 22px;
  margin-bottom: 16px; letter-spacing: -0.01em;
}
.modal h4 span { color: var(--red); }
.modal .art-text {
  font-size: 14px; line-height: 1.7; color: var(--muted-dark);
}
.modal .art-text p { margin-bottom: 10px; }
.modal .art-text .pnum {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); margin-right: 6px;
}

/* ── Reset ─────────────────────────────── */
.reset-wrap { max-width: 960px; margin: 0 auto; padding: 36px 40px 0; }
.reset-btn {
  font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--muted); background: none; border: none;
  cursor: pointer; padding: 8px 0; transition: color 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.reset-btn::before { content: '×'; font-size: 14px; font-weight: 400; }
.reset-btn:hover { color: var(--red); }

/* ── Footer ────────────────────────────── */
footer {
  max-width: 960px; margin: 0 auto; padding: 48px 40px 64px;
  font-size: 13px; color: var(--muted); display: flex;
  justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px 24px;
}
footer .byline {
  font-family: 'DM Serif Display', serif; font-style: italic;
  color: var(--muted-dark); font-size: 16px;
}
footer .disclaimer { font-size: 12px; max-width: 340px; text-align: right; line-height: 1.5; }

/* ── Responsive ────────────────────────── */
@media (max-width: 720px) {
  .top-bar { padding: 20px 24px 0; }
  .masthead {
    grid-template-columns: 1fr; grid-template-rows: auto auto auto;
    padding: 0 24px; margin-top: 32px; gap: 20px;
  }
  .masthead-title { grid-row: 1; grid-column: 1; font-size: 42px; }
  .masthead-desc { grid-row: 2; grid-column: 1; max-width: 100%; align-self: start; padding-bottom: 0; }
  .masthead-progress { grid-row: 3; grid-column: 1; padding-top: 8px; }
  .progress-rule-wrap { padding: 0 24px; margin-top: 28px; }
  .scanner-wrap { padding: 0 24px; margin-top: 36px; }
  .scanner { padding: 22px 20px; }
  .sections { padding: 0 24px; }
  .section-header { grid-template-columns: 28px 1fr auto auto; gap: 10px; padding: 20px 0; }
  .sec-title { font-size: 17px; }
  .section-body { padding: 0 0 22px 28px; }
  .item { padding: 14px 6px; margin: 0 -6px; }
  .reset-wrap { padding: 28px 24px 0; }
  footer { padding: 36px 24px 56px; flex-direction: column; }
  footer .disclaimer { text-align: left; }
}
@media (max-width: 400px) { .sec-badge { display: none; } }
</style>
</head>
<body>

<div class="top-bar">
  <div class="lang-toggle">
    <button id="btnEN" class="active" onclick="setLang('en')">EN</button>
    <span class="sep">/</span>
    <button id="btnDE" onclick="setLang('de')">DE</button>
  </div>
</div>

<header class="masthead">
  <h1 class="masthead-title" id="mastheadTitle"></h1>
  <p class="masthead-desc" id="mastheadDesc"></p>
  <div class="masthead-progress">
    <span class="pct" id="pct">0%</span>
    <span class="label" id="progressLabel"></span>
  </div>
</header>

<div class="progress-rule-wrap">
  <div class="progress-rule"><div class="progress-rule-fill" id="progressFill"></div></div>
</div>

<div class="scanner-wrap">
  <div class="scanner">
    <div class="scanner-head">
      <h3 id="scannerTitle"></h3>
      <span class="scanner-note" id="scannerNote"></span>
    </div>
    <textarea id="scanInput" placeholder=""></textarea>
    <div class="scanner-actions">
      <label class="file-label" for="fileUpload" id="fileLabel"></label>
      <input type="file" id="fileUpload" accept=".txt,.md,.csv,.json,.html,.xml,.log,.yml,.yaml,.docx,.pdf" onchange="handleFile(this)">
      <button class="scan-btn" onclick="runScan()" id="scanBtn"></button>
      <span style="font-size:12px;color:var(--muted)" id="charCount"></span>
    </div>
    <div class="scan-results" id="scanResults"></div>
  </div>
</div>

<div class="sections" id="checklist"></div>

<div class="reset-wrap">
  <button class="reset-btn" id="resetBtn" onclick="resetAll()"></button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h4 id="modalTitle"></h4>
    <div class="art-text" id="modalBody"></div>
  </div>
</div>

<footer>
  <span class="byline">Yihan Ma</span>
  <span class="disclaimer" id="disclaimer"></span>
</footer>

<!-- External libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<!-- Application modules (order matters: data before logic) -->
<script src="js/articles.js"></script>
<script src="js/data.js"></script>
<script src="js/scanner.js"></script>
<script src="js/checklist.js"></script>
<script src="js/main.js"></script>
</body>
</html>
